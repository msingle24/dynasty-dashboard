<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynasty League Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --card: #1c2029;
    --border: #252933;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --cap-total: 200;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #161920 50%, #0d1a14 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    flex-shrink: 0;
  }

  .logo span { color: var(--text); }

  .search-wrap {
    flex: 1;
    max-width: 320px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px 8px 36px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .nav-tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .nav-tab:hover { color: var(--text); background: var(--surface); }
  .nav-tab.active { background: var(--accent); color: #0d0f14; }

  /* MAIN */
  .main { max-width: 1600px; margin: 0 auto; padding: 24px; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* LEAGUE OVERVIEW STRIP */
  .overview-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-pill .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-pill .value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-pill .sub { font-size: 12px; color: var(--muted); }

  /* TEAM GRID */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .team-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .team-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    line-height: 1;
  }

  .cap-block { text-align: right; }

  .cap-remaining {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .cap-remaining.positive { color: var(--green); }
  .cap-remaining.zero { color: var(--orange); }
  .cap-remaining.negative { color: var(--red); }

  .cap-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }

  .cap-bar-wrap { padding: 0 18px 12px; border-bottom: 1px solid var(--border); }
  .cap-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .cap-bar {
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
  }

  .cap-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* ROSTER */
  .roster-wrap { padding: 10px 0 4px; }

  .pos-group { margin-bottom: 0; }

  .pos-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 18px 3px;
  }

  .pos-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    min-width: 28px;
    text-align: center;
  }

  .pos-badge.QB { background: #1e3a5f; color: #60a5fa; }
  .pos-badge.RB { background: #1a3a1a; color: #4ade80; }
  .pos-badge.WR { background: #3a1a00; color: #fb923c; }
  .pos-badge.TE { background: #3a1a3a; color: #c084fc; }

  .player-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 4px 18px;
    transition: background 0.15s;
  }

  .player-row:hover { background: rgba(255,255,255,0.03); }

  .player-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contract-cost {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    min-width: 28px;
    text-align: right;
  }

  .contract-cost.high { color: var(--accent2); }

  .years-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 22px;
    text-align: center;
  }

  .years-pill.y3plus { background: #133a26; color: #4ade80; }
  .years-pill.y2 { background: #3a2d00; color: #fbbf24; }
  .years-pill.y1 { background: #3a1212; color: #f87171; }

  /* DRAFT CAPITAL */
  .draft-section { padding: 8px 18px 14px; border-top: 1px solid var(--border); margin-top: 4px; }

  .draft-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .picks-grid { display: flex; flex-wrap: wrap; gap: 5px; }

  .pick-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid;
    line-height: 1.4;
  }

  .pick-chip.r1 { background: #1a2f1a; border-color: #22c55e; color: #4ade80; }
  .pick-chip.r2 { background: #1a1a2f; border-color: #3b82f6; color: #60a5fa; }

  /* SEARCH HIGHLIGHT */
  .search-result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.2s;
  }

  .search-result-card:hover { border-color: var(--accent); }

  .sr-left { display: flex; flex-direction: column; gap: 4px; }
  .sr-name { font-size: 16px; font-weight: 600; }
  .sr-team { font-size: 13px; color: var(--muted); }
  .sr-right { display: flex; align-items: center; gap: 10px; }

  /* RULES VIEW */
  .rules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .rules-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .rules-card h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .rule-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .rule-row:last-child { border-bottom: none; }
  .rule-key { color: var(--muted); }
  .rule-val { font-weight: 600; color: var(--text); text-align: right; max-width: 55%; }

  /* CAP VIEW */
  .cap-table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .cap-table {
    width: 100%;
    border-collapse: collapse;
  }

  .cap-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 20px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .cap-table td {
    padding: 12px 20px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }

  .cap-table tr:last-child td { border-bottom: none; }
  .cap-table tr:hover td { background: rgba(255,255,255,0.02); }

  .cap-bar-inline {
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    min-width: 80px;
  }

  /* PICKS VIEW */
  .picks-table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .picks-year-group { }

  .picks-year-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .picks-row {
    display: grid;
    grid-template-columns: 1fr 1fr 80px 80px;
    padding: 10px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 12px;
  }

  .picks-row:last-child { border-bottom: none; }
  .picks-row:hover { background: rgba(255,255,255,0.02); }
  .picks-row.header { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  /* SEARCH RESULTS */
  #search-results { display: flex; flex-direction: column; gap: 10px; }
  .no-results { color: var(--muted); text-align: center; padding: 48px; font-size: 14px; }

  /* LEGEND */
  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
  }

  .legend-label { color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    gap: 12px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0d0f14;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Last updated */
  .last-updated {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .team-grid { grid-template-columns: 1fr; }
    .header-inner { height: auto; padding: 12px 0; gap: 12px; }
    .nav-tabs { margin-left: 0; }
  }
</style>
</head>

<header>

    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('teams')">Teams</button>
      <button class="nav-tab" onclick="showView('cap')">Cap</button>
      <button class="nav-tab" onclick="showView('picks')">Picks</button>
      <button class="nav-tab" onclick="showView('rules')">Rules</button>

  </div>

<div class="main">

      <span class="legend-item"><span class="legend-dot" style="background:#3a1212;border:1px solid #f87171;"></span> 1 Year (expiring)</span>
    </div>
    <div class="team-grid" id="team-grid"></div>
  </div>

  <!-- CAP VIEW -->
  <div id="cap-view" class="view" style="display:none;">
    <div class="cap-table-wrap">
      <table class="cap-table" id="cap-table">
        <thead>
          <tr>
            <th>Team</th>
            <th>Total Spent</th>
            <th>Cap Remaining</th>
            <th>Void Cost</th>
            <th>Roster Size</th>
            <th>Utilization</th>
          </tr>
        </thead>
        <tbody id="cap-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- PICKS VIEW -->
  <div id="picks-view" class="view" style="display:none;">
    <div class="picks-table-wrap" id="picks-container"></div>
  </div>

  <!-- RULES VIEW -->
  <div id="rules-view" class="view" style="display:none;">
    <div class="rules-grid" id="rules-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============================================================
// RENDER
// ============================================================

function posOrder(pos) {
  return { QB: 0, RB: 1, WR: 2, TE: 3 }[pos] ?? 4;
}

function yearsPill(years) {
  if (years >= 3) return `<span class="years-pill y3plus">${years}yr</span>`;
  if (years === 2) return `<span class="years-pill y2">${years}yr</span>`;
  return `<span class="years-pill y1">${years}yr</span>`;
}

function capColor(remaining) {
  if (remaining > 5) return 'positive';
  if (remaining >= 0) return 'zero';
  return 'negative';
}

function capFillColor(pct) {
  if (pct < 70) return '#22c55e';
  if (pct < 90) return '#f59e0b';
  return '#ef4444';
}

function buildTeamCard(team) {
  const cap = LEAGUE_DATA.settings.totalCap;
  const spent = team.players.reduce((s, p) => s + p.cost, 0);
  const pct = Math.min(100, (spent / cap) * 100);
  const fillColor = capFillColor(pct);
  const remClass = capColor(team.capRemaining);

  const byPos = {};
  team.players.forEach(p => {
    if (!byPos[p.pos]) byPos[p.pos] = [];
    byPos[p.pos].push(p);
  });

  const posOrder = ['QB', 'RB', 'WR', 'TE'];
  let rosterHtml = '';

  posOrder.forEach(pos => {
    if (!byPos[pos] || byPos[pos].length === 0) return;
    const sorted = byPos[pos].sort((a, b) => b.cost - a.cost);
    rosterHtml += `<div class="pos-group">`;
    sorted.forEach(p => {
      const costClass = p.cost >= 30 ? ' high' : '';
      rosterHtml += `
        <div class="player-row">
          <span class="player-name">${p.name}</span>
          <span class="contract-cost${costClass}">$${p.cost}</span>
          ${yearsPill(p.years)}
        </div>`;
    });
    rosterHtml += `</div>`;
  });

  const picksHtml = team.picks.map(pick => {
    const cls = pick.round === 1 ? 'r1' : 'r2';
    const orig = pick.origTeam !== team.name ? ` <span style="color:var(--muted);font-size:10px;">(${pick.origTeam})</span>` : '';
    return `<span class="pick-chip ${cls}">${pick.year} R${pick.round}${orig}</span>`;
  }).join('');

  const voidHtml = team.voidCost > 0
    ? `<div style="padding:4px 18px 8px;font-size:11px;color:var(--red);">⚠ Void cost: $${team.voidCost}</div>`
    : '';

  return `
    <div class="team-card" id="card-${team.name}">
      <div class="team-header">
        <div>
          <div class="team-name">${team.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${team.players.length} players · $${spent} spent</div>
        </div>
        <div class="cap-block">
          <div class="cap-remaining ${remClass}">$${team.capRemaining}</div>
          <div class="cap-label">cap remaining</div>
        </div>
      </div>
      <div class="cap-bar-wrap">
        <div class="cap-bar-label">
          <span>$0</span>
          <span style="color:var(--muted);">$${spent} / $${cap}</span>
          <span>$${cap}</span>
        </div>
        <div class="cap-bar">
          <div class="cap-fill" style="width:${pct}%;background:${fillColor};"></div>
        </div>
      </div>
      ${voidHtml}
      <div class="roster-wrap">${rosterHtml}</div>
      <div class="draft-section">
        <div class="draft-title">Draft Capital</div>
        <div class="picks-grid">${picksHtml || '<span style="color:var(--muted);font-size:12px;">No picks on file</span>'}</div>
      </div>
    </div>`;
}

function renderTeams() {
  const grid = document.getElementById('team-grid');
  const strip = document.getElementById('overview-strip');

  const totalPlayers = LEAGUE_DATA.teams.reduce((s, t) => s + t.players.length, 0);
  const totalSpent = LEAGUE_DATA.teams.reduce((s, t) => s + t.players.reduce((x, p) => x + p.cost, 0), 0);
  const avgCap = Math.round(totalSpent / LEAGUE_DATA.teams.length);
  const expiringCount = LEAGUE_DATA.teams.reduce((s, t) => s + t.players.filter(p => p.years === 1).length, 0);

  strip.innerHTML = `
    <div class="stat-pill"><div class="label">Teams</div><div class="value">${LEAGUE_DATA.teams.length}</div></div>
    <div class="stat-pill"><div class="label">Total Players</div><div class="value">${totalPlayers}</div></div>
    <div class="stat-pill"><div class="label">Avg Cap Spent</div><div class="value">$${avgCap}</div><div class="sub">of $${LEAGUE_DATA.settings.totalCap} cap</div></div>
    <div class="stat-pill"><div class="label">Expiring Contracts</div><div class="value">${expiringCount}</div><div class="sub">after this season</div></div>
    <div class="stat-pill"><div class="label">Last Updated</div><div class="value" style="font-size:14px;margin-top:4px;">${LEAGUE_DATA.lastUpdated || '—'}</div></div>
  `;

  grid.innerHTML = LEAGUE_DATA.teams.map(buildTeamCard).join('');
}

function renderCap() {
  const tbody = document.getElementById('cap-tbody');
  const cap = LEAGUE_DATA.settings.totalCap;

  const rows = [...LEAGUE_DATA.teams].sort((a, b) => b.capRemaining - a.capRemaining).map(team => {
    const spent = team.players.reduce((s, p) => s + p.cost, 0);
    const pct = Math.min(100, (spent / cap) * 100);
    const fillColor = capFillColor(pct);
    const remClass = capColor(team.capRemaining);
    return `
      <tr>
        <td><strong>${team.name}</strong></td>
        <td>$${spent}</td>
        <td class="${remClass}" style="font-weight:700;color:${team.capRemaining > 5 ? 'var(--green)' : team.capRemaining >= 0 ? 'var(--orange)' : 'var(--red)'}">$${team.capRemaining}</td>
        <td style="color:${team.voidCost > 0 ? 'var(--red)' : 'var(--muted)'}">$${team.voidCost}</td>
        <td>${team.players.length} / ${LEAGUE_DATA.settings.rosterSize}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="cap-bar-inline"><div style="height:100%;background:${fillColor};width:${pct}%;border-radius:4px;"></div></div>
            <span style="font-size:12px;color:var(--muted);">${Math.round(pct)}%</span>
          </div>
        </td>
      </tr>`;
  });

  tbody.innerHTML = rows.join('');
}

function renderPicks() {
  const container = document.getElementById('picks-container');
  const allPicks = [];

  LEAGUE_DATA.teams.forEach(team => {
    team.picks.forEach(pick => {
      allPicks.push({ owner: team.name, ...pick });
    });
  });

  const byYear = {};
  allPicks.forEach(p => {
    if (!byYear[p.year]) byYear[p.year] = [];
    byYear[p.year].push(p);
  });

  const years = Object.keys(byYear).sort();
  let html = '';

  years.forEach(year => {
    const picks = byYear[year].sort((a, b) => a.round - b.round || a.owner.localeCompare(b.owner));
    html += `<div class="picks-year-group">
      <div class="picks-year-header">${year} Draft</div>
      <div class="picks-row header"><span>Owner</span><span>Original Team</span><span>Round</span><span>Pick</span></div>`;
    picks.forEach(p => {
      const cls = p.round === 1 ? 'color:var(--green)' : 'color:var(--blue)';
      html += `
        <div class="picks-row">
          <span style="font-weight:600;">${p.owner}</span>
          <span style="color:${p.origTeam !== p.owner ? 'var(--accent2)' : 'var(--muted)'};">${p.origTeam}</span>
          <span style="${cls};font-weight:700;">Rd ${p.round}</span>
          <span style="color:var(--muted);">${p.pickNum || '—'}</span>
        </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

function renderRules() {
  const grid = document.getElementById('rules-grid');
  const sections = [
    { title: 'League Overview', items: LEAGUE_DATA.rules.overview },
    { title: 'Playoffs', items: LEAGUE_DATA.rules.playoffs },
    { title: 'Fees & Payouts', items: LEAGUE_DATA.rules.fees },
    { title: 'Cap Structure', items: LEAGUE_DATA.rules.cap },
    { title: 'Roster Rules', items: LEAGUE_DATA.rules.roster },
    { title: 'Scoring', items: LEAGUE_DATA.rules.scoring },
    { title: 'Governance', items: LEAGUE_DATA.rules.governance },
  ];

  grid.innerHTML = sections.map(s => `
    <div class="rules-card">
      <h3>${s.title}</h3>
      ${s.items.map(r => `
        <div class="rule-row">
          <span class="rule-key">${r.key}</span>
          <span class="rule-val">${r.val}</span>
        </div>`).join('')}
    </div>`).join('');
}

// ============================================================
// SEARCH
// ============================================================

function handleSearch(query) {
  const q = query.trim().toLowerCase();

  if (!q) {
    document.getElementById('search-view').style.display = 'none';
    document.getElementById(currentView + '-view').style.display = 'block';
    return;
  }

  document.getElementById(currentView + '-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'block';

  const results = [];
  LEAGUE_DATA.teams.forEach(team => {
    team.players.forEach(p => {
      if (p.name.toLowerCase().includes(q)) {
        results.push({ ...p, teamName: team.name });
      }
    });
  });

  const el = document.getElementById('search-results');
  if (results.length === 0) {
    el.innerHTML = `<div class="no-results">No players found matching "${query}"</div>`;
    return;
  }

  el.innerHTML = results.map(r => `
    <div class="search-result-card">
      <div class="sr-left">
        <div class="sr-name">${r.name}</div>
        <div class="sr-team">${r.teamName} · <span class="pos-badge ${r.pos}" style="display:inline;padding:1px 5px;">${r.pos}</span></div>
      </div>
      <div class="sr-right">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent2);">$${r.cost}</span>
        ${yearsPill(r.years)}
      </div>
    </div>`).join('');
}

// ============================================================
// NAV
// ============================================================

let currentView = 'teams';

function showView(view) {
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(view + '-view').style.display = 'block';
  document.querySelector(`.nav-tab[onclick="showView('${view}')"]`).classList.add('active');
  currentView = view;

  const searchInput = document.getElementById('search-input');
  if (searchInput.value.trim()) {
    document.getElementById('search-view').style.display = 'block';
    document.getElementById(view + '-view').style.display = 'none';
  }
}

// ============================================================
// INIT
// ============================================================

function init() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('teams-view').style.display = 'block';
  renderTeams();
  renderCap();
  renderPicks();
  renderRules();
}

init();
</script>
</body>
</html>
